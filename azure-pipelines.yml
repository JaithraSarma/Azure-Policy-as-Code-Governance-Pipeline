##############################################################################
# Azure Policy Gate — CI Pipeline
#
# Triggers on pull requests that modify files under terraform/**
# 1. Installs Python dependencies & Terraform CLI
# 2. Runs terraform init + plan → produces tfplan.json
# 3. Runs the Python policy engine against the plan
# 4. Posts violations as a PR comment via Azure DevOps REST API
# 5. Logs violations to Azure Table Storage
# 6. Fails the pipeline if HIGH severity violations are found
##############################################################################

trigger: none  # Only runs on PRs, not pushes

pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - terraform/**

pool:
  vmImage: "ubuntu-latest"

variables:
  TF_WORKING_DIR: "terraform/demo"
  PYTHON_VERSION: "3.11"
  VIOLATIONS_TABLE_NAME: "PolicyViolations"
  BACKEND_RESOURCE_GROUP: "rg-policy-gate-backend"
  BACKEND_STORAGE_ACCOUNT: "jaithrastorageaccount"
  BACKEND_CONTAINER: "tfstate"
  BACKEND_KEY: "demo.tfstate"

stages:
  # ════════════════════════════════════════════════════════════════════
  # Stage 1 — Terraform Plan
  # ════════════════════════════════════════════════════════════════════
  - stage: TerraformPlan
    displayName: "Terraform Plan"
    jobs:
      - job: Plan
        displayName: "Init → Plan → JSON"
        steps:
          # ── Checkout ─────────────────────────────────────────────────
          - checkout: self
            fetchDepth: 1

          # ── Install Terraform (shell-based — no marketplace dependency) ──
          - script: |
              TERRAFORM_VERSION=$(curl -s https://checkpoint-api.hashicorp.com/v1/check/terraform | python3 -c "import sys,json; print(json.load(sys.stdin)['current_version'])")
              echo "Installing Terraform ${TERRAFORM_VERSION}"
              curl -fsSL "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip" -o terraform.zip
              unzip -o terraform.zip -d /usr/local/bin/
              rm terraform.zip
              terraform version
            displayName: "Install Terraform (latest)"

          # ── Terraform Init ───────────────────────────────────────────
          - task: AzureCLI@2
            displayName: "Terraform Init"
            inputs:
              azureSubscription: "azure-policy-gate-sc"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                terraform init \
                  -backend-config="resource_group_name=$(BACKEND_RESOURCE_GROUP)" \
                  -backend-config="storage_account_name=$(BACKEND_STORAGE_ACCOUNT)" \
                  -backend-config="container_name=$(BACKEND_CONTAINER)" \
                  -backend-config="key=$(BACKEND_KEY)" \
                  -input=false
              workingDirectory: $(TF_WORKING_DIR)
            env:
              ARM_USE_CLI: "true"

          # ── Terraform Plan → binary ──────────────────────────────────
          - task: AzureCLI@2
            displayName: "Terraform Plan"
            inputs:
              azureSubscription: "azure-policy-gate-sc"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                terraform plan -out=tfplan.bin -input=false -detailed-exitcode
                PLAN_EXIT_CODE=$?
                if [ $PLAN_EXIT_CODE -eq 1 ]; then
                  echo "##vso[task.logissue type=error]Terraform plan failed with error."
                  exit 1
                elif [ $PLAN_EXIT_CODE -eq 0 ] || [ $PLAN_EXIT_CODE -eq 2 ]; then
                  echo "Terraform plan completed successfully."
                  exit 0
                else
                  echo "##vso[task.logissue type=error]Terraform plan returned unexpected exit code: $PLAN_EXIT_CODE"
                  exit $PLAN_EXIT_CODE
                fi
              workingDirectory: $(TF_WORKING_DIR)
            env:
              ARM_USE_CLI: "true"

          # ── Convert to JSON ──────────────────────────────────────────
          - script: |
              terraform show -json tfplan.bin > tfplan.json
              echo "Plan JSON size: $(wc -c < tfplan.json) bytes"
            displayName: "Convert Plan to JSON"
            workingDirectory: $(TF_WORKING_DIR)

          # ── Publish as artifact ──────────────────────────────────────
          - publish: $(TF_WORKING_DIR)/tfplan.json
            artifact: tfplan
            displayName: "Publish Plan JSON"

  # ════════════════════════════════════════════════════════════════════
  # Stage 2 — Policy Check
  # ════════════════════════════════════════════════════════════════════
  - stage: PolicyCheck
    displayName: "Policy Check"
    dependsOn: TerraformPlan
    condition: succeeded()
    jobs:
      - job: Evaluate
        displayName: "Run Policy Engine"
        steps:
          # ── Download plan artifact ───────────────────────────────────
          - download: current
            artifact: tfplan
            displayName: "Download Plan JSON"

          # ── Set up Python ────────────────────────────────────────────
          - task: UsePythonVersion@0
            displayName: "Use Python $(PYTHON_VERSION)"
            inputs:
              versionSpec: $(PYTHON_VERSION)

          # ── Install dependencies ─────────────────────────────────────
          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: "Install Python Dependencies"

          # ── Run policy engine ────────────────────────────────────────
          - script: |
              python -m policy_engine.main $(Pipeline.Workspace)/tfplan/tfplan.json --format sarif
            displayName: "Evaluate Policies"
            env:
              # Azure DevOps PR variables (auto-populated in PR context)
              SYSTEM_TEAMFOUNDATIONCOLLECTIONURI: $(System.TeamFoundationCollectionUri)
              SYSTEM_TEAMPROJECT: $(System.TeamProject)
              BUILD_REPOSITORY_ID: $(Build.Repository.ID)
              BUILD_REPOSITORY_NAME: $(Build.Repository.Name)
              SYSTEM_PULLREQUEST_PULLREQUESTID: $(System.PullRequest.PullRequestId)
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
              # Table Storage
              AZURE_STORAGE_CONNECTION_STRING: $(AZURE_STORAGE_CONNECTION_STRING)
              VIOLATIONS_TABLE_NAME: $(VIOLATIONS_TABLE_NAME)
              # Report output paths
              POLICY_REPORT_PATH: $(Build.ArtifactStagingDirectory)/policy-report.md
              POLICY_SARIF_PATH: $(Build.ArtifactStagingDirectory)/policy-report.sarif

          # ── Publish report ───────────────────────────────────────────
          - publish: $(Build.ArtifactStagingDirectory)/policy-report.md
            artifact: policy-report
            displayName: "Publish Policy Report"
            condition: always()

          - publish: $(Build.ArtifactStagingDirectory)/policy-report.sarif
            artifact: policy-report-sarif
            displayName: "Publish Policy Report (SARIF)"
            condition: always()
